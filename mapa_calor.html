<!DOCTYPE html>
<html>
<head>
    <title>Mapa de calor AiFucito</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Librerías para OpenStreetMap y Heatmap -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Crear el mapa
        var map = L.map('map').setView([0, 0], 2); // Comienza centrado en el mundo

        // Cargar el mapa base de OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Datos de ejemplo para el heatmap: latitud, longitud, intensidad (opcional)
        var heatData = [
            [ -34.90328, -56.18816, 0.5 ],  // Montevideo
            [ 40.7128, -74.0060, 0.8 ],     // Nueva York
            [ 51.5074, -0.1278, 0.3 ]       // Londres
        ];

        // Crear el heatmap
        var heat = L.heatLayer(heatData, {radius: 25, blur: 15, maxZoom: 17}).addTo(map);
    </script>
</body>
</html>
